ai_usage_summary: |
  Used Gemini AI assistant for codebase exploration, honeypot analysis strategy,
  and logic verification of the scoring pipeline.
  No candidate profile data was uploaded to any external LLM APIs at any time.
  All ranking logic runs fully offline on local CPU.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-stage hybrid rule-based ranker with full explainability.

  Stage 1 — Security Filter:
    Detects and blocks 65 honeypot profiles using three checks:
    (1) Expert/Advanced skill with duration_months = 0
    (2) Job duration > calendar months elapsed + 12
    (3) Claimed YoE vs actual career history mismatch

  Stage 2 — Multi-Factor Scoring:
    Five scoring dimensions combined linearly:
    - Skills Match       (40%): Embeddings, Vector DBs, Python, Eval Metrics
    - Experience Match   (20%): Target band 5-9 years, penalizes pure academics
    - Company Type       (15%): Boosts product startups, penalizes consulting-only
    - Location Match     (15%): Noida/Pune preferred, Tier-1 cities acceptable
    - Notice Period      (10%): Sub-30 days preferred

  Behavioral Modifier (Multiplicative):
    Final score multiplied by platform engagement signals:
    login recency, recruiter response rate, interview attendance, open-to-work flag.

  Reasoning Generator:
    Template-based, zero-hallucination explanations using only real profile data.

  Runtime: ~78 seconds for 100,000 candidates on standard CPU.

